kind = "web"
previewPath = "/"
title = "ScamShield AI"
version = "1.0.0"
id = "artifacts/scamshield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24814

[services.development]
run = "pnpm --filter @workspace/scamshield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scamshield", "run", "build" ]
publicDir = "artifacts/scamshield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24814"
BASE_PATH = "/"
