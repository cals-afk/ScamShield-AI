openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ScamShield AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scam
    description: Scam detection operations
  - name: theme
    description: Theme generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /scam/analyse:
    post:
      operationId: analyseMessage
      tags: [scam]
      summary: Analyse a message for scam indicators
      description: Uses AI to analyse text for phishing, scam, and social engineering indicators
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScamAnalysis"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /theme/generate:
    post:
      operationId: generateTheme
      tags: [theme]
      summary: Generate a color theme inspired by a character
      description: Uses AI to derive a futuristic cybersecurity color theme from a character name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "200":
          description: Generated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterTheme"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MessageInput:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
          description: The text or phone number to analyse for scam indicators
        inputType:
          type: string
          enum: [message, phone_number]
          description: The type of input being analysed (defaults to message)
    ScamAnalysis:
      type: object
      required:
        - scamPercentage
        - verdict
        - explanation
        - indicators
        - threatType
        - whySuspicious
        - recommendedAction
      properties:
        scamPercentage:
          type: integer
          minimum: 0
          maximum: 100
          description: Likelihood of the message being a scam (0-100)
        verdict:
          type: string
          enum: [safe, suspicious, likely_scam, definite_scam]
          description: Overall verdict category
        explanation:
          type: string
          description: Plain-language explanation of the analysis
        threatType:
          type: string
          description: Short label for the type of threat (e.g. "Prize Scam", "Phishing Link", "Impersonation")
        whySuspicious:
          type: string
          description: Simple everyday explanation of why this message is dangerous, written for a non-technical user
        recommendedAction:
          type: string
          description: Clear, actionable advice for what the user should do
        indicators:
          type: array
          items:
            $ref: "#/components/schemas/ScamIndicator"
          description: Specific red flags or reassuring factors found
    ScamIndicator:
      type: object
      required:
        - type
        - description
        - severity
      properties:
        type:
          type: string
          enum: [red_flag, yellow_flag, safe_signal]
        description:
          type: string
    CharacterInput:
      type: object
      required:
        - character
      properties:
        character:
          type: string
          minLength: 1
          description: The name of the character or hero to inspire the theme
    CharacterTheme:
      type: object
      required:
        - primaryColor
        - secondaryColor
        - accentColor
        - backgroundColor
        - foregroundColor
        - label
        - tagline
        - particleShape
      properties:
        primaryColor:
          type: string
          description: Main neon accent color (hex)
        secondaryColor:
          type: string
          description: Supporting color (hex)
        accentColor:
          type: string
          description: Highlight / glow color (hex)
        backgroundColor:
          type: string
          description: Deep background color (hex)
        foregroundColor:
          type: string
          description: Text/icon color (hex)
        label:
          type: string
          description: Short thematic label for the hero (e.g. "STARK PROTOCOL")
        tagline:
          type: string
          description: Short cinematic tagline shown during activation (e.g. "Suit online. Threat detected.")
        particleShape:
          type: string
          enum: [circle, triangle, diamond, hex, star]
          description: Shape of background particles
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
